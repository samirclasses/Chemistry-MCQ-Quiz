const quizDiv = document.getElementById("quiz");

questions.forEach((item,index)=>{
    let div=document.createElement("div");
    div.classList.add("question");
    div.innerHTML=`<p>${item.q}</p>`;
    item.options.forEach((opt,i)=>{
        div.innerHTML+=`
        <label>
        <input type="radio" name="q${index}" value="${i}">
        ${opt}
        </label><br>`;
    });
    quizDiv.appendChild(div);
});

function submitQuiz(){
    let score = 0;

    questions.forEach((item,index)=>{

        let selected = document.querySelector(`input[name="q${index}"]:checked`);
        let options = document.querySelectorAll(`input[name="q${index}"]`);

        options.forEach((opt,i)=>{

            let label = opt.parentElement;

            if(i === item.answer){
                label.style.color = "green";
                label.style.fontWeight = "bold";
            }

            if(selected && parseInt(selected.value) !== item.answer && opt.checked){
                label.style.color = "red";
                label.style.fontWeight = "bold";
            }

            opt.disabled = true; // disable after submit
        });

        if(selected && parseInt(selected.value) === item.answer){
            score += 4;
        }

    });

    document.getElementById("result").innerHTML =
        `<h2>Total Score: ${score} / 200</h2>`;
}
