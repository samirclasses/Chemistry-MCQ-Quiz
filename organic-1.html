`(a) CaSO₄·½H₂O`,
`(b) CaCO₃`,
`(c) CaO`,
`(d) CaCl₂`
],
answer:0
}
];
  function loadQuiz(){
    const quiz = document.getElementById("quiz");
    quizData.forEach((item,index)=>{
        let questionDiv = document.createElement("div");
        questionDiv.classList.add("question");

        let questionTitle = document.createElement("h3");
        questionTitle.innerHTML = item.q;
        questionDiv.appendChild(questionTitle);

        item.options.forEach((opt,i)=>{
            let optionDiv = document.createElement("div");
            optionDiv.classList.add("option");
            optionDiv.innerHTML = opt;

            optionDiv.onclick = function(){
                let siblings = optionDiv.parentElement.querySelectorAll(".option");
                siblings.forEach(s=>s.classList.remove("correct","wrong"));

                if(i === item.answer){
                    optionDiv.classList.add("correct");
                } else {
                    optionDiv.classList.add("wrong");
                }
            };

            questionDiv.appendChild(optionDiv);
        });

        quiz.appendChild(questionDiv);
    });
}

function calculateScore(){
    let score = 0;
    const questions = document.querySelectorAll(".question");

    questions.forEach((q,index)=>{
        const selected = q.querySelector(".correct");
        if(selected) score++;
    });

    document.getElementById("scoreBox").innerHTML =
        "Your Score: " + score + " / " + quizData.length;
}

loadQuiz();
</script>
