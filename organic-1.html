function loadQuiz(){
const quiz = document.getElementById("quiz");

quizData.forEach((item,index)=>{
    const div = document.createElement("div");
    div.classList.add("question");
    div.innerHTML = "<h3>"+item.q+"</h3>";

    item.options.forEach((opt,i)=>{
        const option = document.createElement("div");
        option.classList.add("option");
        option.innerHTML = opt;

        option.onclick = function(){
            if(option.classList.contains("correct") || option.classList.contains("wrong")) return;

            if(i === item.answer){
                option.classList.add("correct");
            } else {
                option.classList.add("wrong");
                div.querySelectorAll(".option")[item.answer].classList.add("correct");
            }
        };

        div.appendChild(option);
    });

    quiz.appendChild(div);
});
}

function calculateScore(){
let score = 0;
const questions = document.querySelectorAll(".question");

questions.forEach((q,index)=>{
    const correctIndex = quizData[index].answer;
    if(q.querySelectorAll(".option")[correctIndex].classList.contains("correct")){
        score++;
    }
});

document.getElementById("scoreBox").innerHTML =
"Your Score: " + score + " / " + quizData.length;
}

loadQuiz();
</script>
