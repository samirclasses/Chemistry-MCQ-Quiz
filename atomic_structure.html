<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atomic Structure Quiz</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f8fb;
    padding:20px;
}
h1{
    text-align:center;
}
.question{
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:8px;
    box-shadow:0 0 5px rgba(0,0,0,0.1);
}
.correct{
    color:green;
    font-weight:bold;
}
.incorrect{
    color:red;
    font-weight:bold;
}
button{
    padding:10px 20px;
    font-size:16px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:5px;
    cursor:pointer;
}
button:hover{
    background:#0056b3;
}
#result{
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>

<body>
<h2>Apex Chemistry</h2>
<h1>Atomic Structure </h1>

<form id="quizForm">

<div id="questions"></div>

<center>
<button type="button" onclick="checkAnswers()">Submit</button>
</center>

</form>

<div id="result"></div>

<script>

const quizData = [
{q:"J.J Thomson ইলেকট্রন আবিষ্কার করেন কোন পরীক্ষায়?", options:["Oil Drop","Cathode Ray","Alpha Scattering","Photoelectric"], answer:1},
{q:"Rutherford স্বর্ণপত্র পরীক্ষায় কোন কণা ব্যবহার করেন?", options:["Beta","Gamma","Alpha","Proton"], answer:2},
{q:"Bohr মডেলে ইলেকট্রন ঘোরে?", options:["সরলরেখা","উপবৃত্ত","নির্দিষ্ট শক্তিস্তর","এলোমেলো"], answer:2},
{q:"n=3 হলে শক্তি কত?", options:["-13.6eV","-3.4eV","-1.51eV","-0.85eV"], answer:2},
{q:"পারমাণবিক সংখ্যা 17 হলে ইলেকট্রন?", options:["16","17","18","34"], answer:1},
{q:"নিউট্রনের আবিষ্কারক?", options:["Chadwick","Thomson","Goldstein","Rutherford"], answer:0},
{q:"সর্বাধিক ইলেকট্রন সূত্র?", options:["2n","n²","2n²","n³"], answer:2},
{q:"আয়নন শক্তি?", options:["প্রোটন অপসারণ","ইলেকট্রন অপসারণ","নিউট্রন অপসারণ","শক্তি নির্গমন"], answer:1},
{q:"De Broglie সমীকরণ?", options:["hν","hc/λ","h/mv","mv/h"], answer:2},
{q:"Uncertainty Principle অনুযায়ী?", options:["ভর-শক্তি","অবস্থান-ভরবেগ","ভর-আধান","শক্তি-ভরবেগ"], answer:1},
{q:"অরবিটালের আকার নির্ধারণ করে?", options:["n","l","m","s"], answer:1},
{q:"mₗ এর মান?", options:["-l থেকে +l","-n থেকে +n","0 থেকে n","∞"], answer:0},
{q:"4p এর n?", options:["2","3","4","5"], answer:2},
{q:"ভরসংখ্যা 35, নিউট্রন 18, প্রোটন?", options:["17","18","35","53"], answer:0},
{q:"আইসোটোপ?", options:["সমান ভর","সমান পারমাণবিক সংখ্যা","সমান নিউট্রন","সমান ইলেকট্রন"], answer:1},
{q:"দৃশ্যমান সিরিজ?", options:["Lyman","Balmer","Paschen","Brackett"], answer:1},
{q:"Planck মতে শক্তি?", options:["অবিচ্ছিন্ন","কোয়ান্টা","তরঙ্গ","কণিকা"], answer:1},
{q:"স্পিন সংখ্যা?", options:["0","±1","±1/2","1/3"], answer:2},
{q:"p সাবশেল অরবিটাল?", options:["1","2","3","5"], answer:2},
{q:"এক অরবিটালে সর্বাধিক?", options:["1","2","3","4"], answer:1},
{q:"Aufbau নীতি?", options:["উচ্চ আগে","নিম্ন আগে","একসাথে","এলোমেলো"], answer:1},
{q:"হাইড্রোজেন আয়নন শক্তি?", options:["3.4","13.6","1.51","0.85"], answer:1},
{q:"3d ইলেকট্রন সংখ্যা?", options:["6","8","10","14"], answer:2},
{q:"Schrodinger সমীকরণ নির্দেশ করে?", options:["পথ","সম্ভাব্য অবস্থান","নিউক্লিয়াস আকার","ভরবেগ"], answer:1},
{q:"Hund নিয়ম?", options:["জোড়া আগে","একক আগে","উচ্চ আগে","এলোমেলো"], answer:1}
];

const questionContainer = document.getElementById("questions");

quizData.forEach((data,index)=>{
    let div = document.createElement("div");
    div.classList.add("question");
    div.innerHTML = `<p><b>Q${index+1}. ${data.q}</b></p>`;
    
    data.options.forEach((opt,i)=>{
        div.innerHTML += `
        <label>
        <input type="radio" name="q${index}" value="${i}"> ${opt}
        </label><br>`;
    });

    div.innerHTML += `<p id="feedback${index}"></p>`;
    questionContainer.appendChild(div);
});

function checkAnswers(){
    let score = 0;

    quizData.forEach((data,index)=>{
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        const feedback = document.getElementById(`feedback${index}`);
        
        if(selected){
            if(parseInt(selected.value) === data.answer){
                score += 4;
                feedback.innerHTML = "✔ Correct (৪ নম্বর)";
                feedback.className="correct";
            }else{
                feedback.innerHTML = "✘ Incorrect";
                feedback.className="incorrect";
            }
        }else{
            feedback.innerHTML = "✘ Not Answered";
            feedback.className="incorrect";
        }
    });

    document.getElementById("result").innerHTML = 
    "আপনার মোট নম্বর: " + score + " / 100";
}

</script>

</body>
</html>
