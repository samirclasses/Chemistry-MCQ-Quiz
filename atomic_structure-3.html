<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Atomic Structure MCQ Quiz</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f4f8;
    padding:20px;
}

h2{
    text-align:center;
}

.quiz-box{
    background:#ffffff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.question{
    margin-bottom:20px;
    padding:15px;
    border-bottom:1px solid #ddd;
}

.correct{
    color:green;
    font-weight:bold;
}

.incorrect{
    color:red;
    font-weight:bold;
}

button{
    padding:10px 20px;
    font-size:16px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

#result{
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
}
</style>

</head>
<body>

<h2>Atomic Structure MCQ Quiz</h2>

<div class="quiz-box">
<form id="quizForm"></form>

<button type="button" onclick="submitQuiz()">Submit</button>

<div id="result"></div>
</div>

<script>

const questions = [

{q:"A monoenergetic electron beam wavelength is halved. Kinetic energy changes by factor?",
options:["8","6","4","3"], answer:2},

{q:"de Broglie wavelength of 1 kg ball having KE 0.5 J?",
options:["6.626 × 10⁻³⁴ m","13.2 × 10⁻³⁴ m","10.38 × 10⁻²¹ m","6.626 Å"], answer:2},

{q:"Correct increasing energy order?",
options:["(iv)<(ii)<(iii)<(i)",
"(ii)<(iv)<(i)<(iii)",
"(i)<(iii)<(ii)<(iv)",
"(iii)<(i)<(iv)<(ii)"], answer:1},

{q:"Wavelength for n=4 → n=1 (Lyman)?",
options:["96.97 nm","969.7 nm","9.697 nm","None"], answer:0},

{q:"Energy of first state of Li²⁺?",
options:["19.6×10⁻¹⁸","4.41×10⁻¹⁸","19.6×10⁻¹⁹","4.41×10⁻¹⁷"], answer:3},

{q:"Mass ratio first Lyman : first Balmer?",
options:["4:1","27:5","1:4","5:27"], answer:1},

{q:"Shortest wavelength at 50kV X-ray?",
options:["0.1245 Å","0.3485 Å","0.2485 Å","0.03456 Å"], answer:2},

{q:"Energy difference ratio (2-3)/(3-4)?",
options:["7/20","20/7","27/9","9/27"], answer:1},

{q:"de Broglie wavelength in 3rd orbit?",
options:["2πa","6πa","3a","a/3"], answer:1},

{q:"Longest Balmer of He⁺?",
options:["a/4","5a/9","4a/9","9a/5"], answer:1},

{q:"Max electrons in orbit diameter 16.92 Å?",
options:["32","16","48","72"], answer:0},

{q:"Correct wavelength relation?",
options:["X₁+X₂+X₃=0",
"X₃=X₁+X₂",
"X₃²=X₁²+X₂²",
"X₃=(X₁X₂)/(X₁+X₂)"], answer:3},

{q:"Photons emitted per second?",
options:["2.51×10³⁰","2.27×10²⁸","1.72×10³⁰","1.77×10²⁷"], answer:2},

{q:"Moles of electrons in 1 kg?",
options:["6.023×10²³",
"1/(9.108×10³¹)",
"6.023/(9.108×10⁵⁴)",
"1/(9.108×6.023)×10⁸"], answer:3},

{q:"Infinity to n=1 wavelength?",
options:["91 nm","192 nm","406 nm","9.1×10⁻⁸ nm"], answer:0},

{q:"Highest energy set?",
options:["n=3,l=2","n=4,l=0","n=3,l=0","n=3,l=1"], answer:0},

{q:"Not isoelectronic set?",
options:["PO₄³⁻,SO₄²⁻,ClO₄⁻",
"CN⁻,N₂,C₂²⁻",
"SO₃²⁻,CO₃²⁻,NO₃⁻",
"BO₃³⁻,CO₃²⁻,NO₃⁻"], answer:2},

{q:"The orientation of an atomic orbital is governed by which quantum number?",
options:["Principal quantum number",
"Azimuthal quantum number",
"Magnetic quantum number",
"Spin quantum number"], answer:2},

{q:"Which of the following sets contains only isoelectronic species?",
options:["CN⁻, N₂, CO",
"NO₂, CO₂, SO₂",
"Na⁺, Mg²⁺, Al³⁺",
"O²⁻, F⁻, Ne"], answer:0},

{q:"Energy of hydrogen atom in ground state is:",
options:["-13.6 eV",
"-3.4 eV",
"-1.51 eV",
"-0.85 eV"], answer:0},

{q:"Maximum number of electrons in n = 4 shell is:",
options:["8","16","18","32"], answer:3},

{q:"Number of orbitals present in 3d subshell is:",
options:["3","5","7","9"], answer:1},

{q:"If frequency of radiation doubles, its energy becomes:",
options:["Half",
"Double",
"Four times",
"Unchanged"], answer:1},

{q:"The de Broglie wavelength is inversely proportional to:",
options:["Velocity",
"Momentum",
"Charge",
"Energy"], answer:1},

{q:"Which transition in hydrogen atom emits maximum energy?",
options:["n=2 → n=1",
"n=3 → n=2",
"n=4 → n=3",
"n=5 → n=4"], answer:0}

];

// Randomize questions
questions.sort(() => Math.random() - 0.5);

const form = document.getElementById("quizForm");

questions.forEach((item,index)=>{
    let div=document.createElement("div");
    div.className="question";
    div.innerHTML="<p><b>"+(index+1)+". "+item.q+"</b></p>";

    item.options.forEach((opt,i)=>{
        div.innerHTML+=`
        <label id="label${index}_${i}">
        <input type="radio" name="q${index}" value="${i}">
        ${opt}
        </label><br>`;
    });

    form.appendChild(div);
});

function submitQuiz(){

    let score=0;

    questions.forEach((item,index)=>{

        let selected=document.querySelector(`input[name="q${index}"]:checked`);

        item.options.forEach((opt,i)=>{
            let label=document.getElementById(`label${index}_${i}`);

            if(i===item.answer){
                label.classList.add("correct");
            }
        });

        if(selected){
            if(parseInt(selected.value)===item.answer){
                score++;
            } else {
                let wrongLabel=document.getElementById(`label${index}_${selected.value}`);
                wrongLabel.classList.add("incorrect");
            }
        }
    });

    document.getElementById("result").innerHTML=
    `Total Questions: ${questions.length}<br>
     Correct: ${score}<br>
     Incorrect: ${questions.length-score}<br>
     Score: ${(score/questions.length*100).toFixed(2)}%`;
}

</script>

</body>
</html>
