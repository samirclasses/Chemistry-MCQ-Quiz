<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Atomic Structure MCQ Quiz</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f4f8;
    padding:20px;
}

h2{
    text-align:center;
}

.quiz-box{
    background:#ffffff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.question{
    margin-bottom:20px;
    padding:15px;
    border-bottom:1px solid #ddd;
}

.correct{
    color:green;
    font-weight:bold;
}

.incorrect{
    color:red;
    font-weight:bold;
}

button{
    padding:10px 20px;
    font-size:16px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

#result{
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
}
</style>

</head>
<body>

<h2>Atomic Structure MCQ Quiz</h2>

<div class="quiz-box">
<form id="quizForm"></form>

<button type="button" onclick="submitQuiz()">Submit</button>

<div id="result"></div>
</div>

<script>

const questions = [

{q:"A monoenergetic electron beam wavelength is halved. Kinetic energy changes by factor?",
options:["8","6","4","3"], answer:2},

{q:"de Broglie wavelength of 1 kg ball having KE 0.5 J?",
options:["6.626 Г— 10вЃ»ВівЃґ m","13.2 Г— 10вЃ»ВівЃґ m","10.38 Г— 10вЃ»ВІВ№ m","6.626 Г…"], answer:2},

{q:"Correct increasing energy order?",
options:["(iv)<(ii)<(iii)<(i)",
"(ii)<(iv)<(i)<(iii)",
"(i)<(iii)<(ii)<(iv)",
"(iii)<(i)<(iv)<(ii)"], answer:1},

{q:"Wavelength for n=4 в†’ n=1 (Lyman)?",
options:["96.97 nm","969.7 nm","9.697 nm","None"], answer:0},

{q:"Energy of first state of LiВІвЃє?",
options:["19.6Г—10вЃ»В№вЃё","4.41Г—10вЃ»В№вЃё","19.6Г—10вЃ»В№вЃ№","4.41Г—10вЃ»В№вЃ·"], answer:3},

{q:"Mass ratio first Lyman : first Balmer?",
options:["4:1","27:5","1:4","5:27"], answer:1},

{q:"Shortest wavelength at 50kV X-ray?",
options:["0.1245 Г…","0.3485 Г…","0.2485 Г…","0.03456 Г…"], answer:2},

{q:"Energy difference ratio (2-3)/(3-4)?",
options:["7/20","20/7","27/9","9/27"], answer:1},

{q:"de Broglie wavelength in 3rd orbit?",
options:["2ПЂa","6ПЂa","3a","a/3"], answer:1},

{q:"Longest Balmer of HeвЃє?",
options:["a/4","5a/9","4a/9","9a/5"], answer:1},

{q:"Max electrons in orbit diameter 16.92 Г…?",
options:["32","16","48","72"], answer:0},

{q:"Correct wavelength relation?",
options:["Xв‚Ѓ+Xв‚‚+Xв‚ѓ=0",
"Xв‚ѓ=Xв‚Ѓ+Xв‚‚",
"Xв‚ѓВІ=Xв‚ЃВІ+Xв‚‚ВІ",
"Xв‚ѓ=(Xв‚ЃXв‚‚)/(Xв‚Ѓ+Xв‚‚)"], answer:3},

{q:"Photons emitted per second?",
options:["2.51Г—10ВівЃ°","2.27Г—10ВІвЃё","1.72Г—10ВівЃ°","1.77Г—10ВІвЃ·"], answer:2},

{q:"Moles of electrons in 1 kg?",
options:["6.023Г—10ВІВі",
"1/(9.108Г—10ВіВ№)",
"6.023/(9.108Г—10вЃµвЃґ)",
"1/(9.108Г—6.023)Г—10вЃё"], answer:3},

{q:"Infinity to n=1 wavelength?",
options:["91 nm","192 nm","406 nm","9.1Г—10вЃ»вЃё nm"], answer:0},

{q:"Highest energy set?",
options:["n=3,l=2","n=4,l=0","n=3,l=0","n=3,l=1"], answer:0},

{q:"Not isoelectronic set?",
options:["POв‚„ВівЃ»,SOв‚„ВІвЃ»,ClOв‚„вЃ»",
"CNвЃ»,Nв‚‚,Cв‚‚ВІвЃ»",
"SOв‚ѓВІвЃ»,COв‚ѓВІвЃ»,NOв‚ѓвЃ»",
"BOв‚ѓВівЃ»,COв‚ѓВІвЃ»,NOв‚ѓвЃ»"], answer:2}

];

// Randomize questions
questions.sort(() => Math.random() - 0.5);

const form = document.getElementById("quizForm");

questions.forEach((item,index)=>{
    let div=document.createElement("div");
    div.className="question";
    div.innerHTML="<p><b>"+(index+1)+". "+item.q+"</b></p>";

    item.options.forEach((opt,i)=>{
        div.innerHTML+=`
        <label id="label${index}_${i}">
        <input type="radio" name="q${index}" value="${i}">
        ${opt}
        </label><br>`;
    });

    form.appendChild(div);
});

function submitQuiz(){

    let score=0;

    questions.forEach((item,index)=>{

        let selected=document.querySelector(`input[name="q${index}"]:checked`);

        item.options.forEach((opt,i)=>{
            let label=document.getElementById(`label${index}_${i}`);

            if(i===item.answer){
                label.classList.add("correct");
            }
        });

        if(selected){
            if(parseInt(selected.value)===item.answer){
                score++;
            } else {
                let wrongLabel=document.getElementById(`label${index}_${selected.value}`);
                wrongLabel.classList.add("incorrect");
            }
        }
    });

    document.getElementById("result").innerHTML=
    `Total Questions: ${questions.length}<br>
     Correct: ${score}<br>
     Incorrect: ${questions.length-score}<br>
     Score: ${(score/questions.length*100).toFixed(2)}%`;
}

</script>

</body>
</html>
