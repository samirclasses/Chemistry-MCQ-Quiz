<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Structure of Atoms - Previous Years MCQ Quiz</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    padding:20px;
}
.container{
    max-width:900px;
    margin:auto;
    background:#ffffff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
h1{
    text-align:center;
    color:#2c3e50;
}
.question{
    margin-bottom:20px;
    padding:15px;
    background:#f9fbff;
    border-left:5px solid #3498db;
    border-radius:5px;
}
button{
    padding:10px 20px;
    background:#2ecc71;
    border:none;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}
button:hover{
    background:#27ae60;
}
.result{
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
}
.correct{color:green;}
.wrong{color:red;}
</style>

</head>
<body>

<div class="container">
<h1>Structure of Atoms вҖ“ MCQ Quiz</h1>

<form id="quizForm">

<!-- QUESTIONS -->

<script>
const questions = [
{q:"1. Set of isoelectronic species is:",
o:["H2, CO2, CNвҒ», OвҒ»","N, H2S, CO","N2, CO, CNвҒ», O2ВІвҒә","Ca, Mg, Cl"],a:2},
{q:"2. Wavelength of photon when О”E = 3.03Г—10вҒ»В№вҒ№ J:",
o:["6.56 nm","65.6 nm","656 nm","0.656 nm"],a:2},
{q:"3. Which forms colourless solution in aqueous medium?",
o:["VВівҒә","CrВівҒә","TiВівҒә","ScВівҒә"],a:3},
{q:"4. Quantum numbers n=3,l=2,m=+2 possible for how many orbitals?",
o:["1","2","3","4"],a:1},
{q:"5. Which is isoelectronic?",
o:["CO2 & NO2","NO2вҒ» & CO2","CNвҒ» & CO","SO2 & CO2"],a:2},
{q:"6. Kinetic energy of first excited state of H atom:",
o:["+3.4 eV","+6.8 eV","-13.6 eV","+13.6 eV"],a:0},
{q:"7. Ionic radii order (OВІвҒ», FвҒ», NaвҒә, MgВІвҒә, AlВівҒә):",
o:["Increase then decrease","Decrease then increase","Significant increase","Significant decrease"],a:3},
{q:"8. Wavelength (ОҪ=8Г—10В№вҒө sвҒ»В№):",
o:["4Г—10В№ nm","3Г—10вҒ· nm","2Г—10вҒ»ВІвҒө nm","5Г—10В№вҒё nm"],a:0},
{q:"9. Ion with 3dВІ configuration:",
o:["TiВівҒә","VвҒҙвҒә","CrВівҒә","TiВІвҒә"],a:3},
{q:"10. Frequency emitted (n=4 to n=1):",
o:["1.54Г—10В№вҒө sвҒ»В№","1.03Г—10В№вҒө sвҒ»В№","3.08Г—10В№вҒө sвҒ»В№","2Г—10В№вҒө sвҒ»В№"],a:2},
{q:"11. Energy of 4th Bohr orbit:",
o:["-164 kJ/mol","-41 kJ/mol","-82 kJ/mol","-1312 kJ/mol"],a:2},
{q:"12. Orientation of orbital governed by:",
o:["Magnetic quantum number","Principal quantum number","Azimuthal quantum number","Spin quantum number"],a:0},
{q:"13. Uncertainty in velocity:",
o:["5.79Г—10вҒө m/s","5.79Г—10вҒҙ m/s","5.79Г—10вҒ¶ m/s","5.79Г—10вҒ· m/s"],a:2},
{q:"14. Both ions coloured:",
o:["ScВівҒә, CoВІвҒә","NiВІвҒә, CuвҒә","NiВІвҒә, TiВівҒә","ScВівҒә, TiВівҒә"],a:2},
{q:"15. Impossible quantum number set:",
o:["2,3,4","1,2,3,4","2,4,5","1 and 3"],a:2},
{q:"16. If О”x = О”p, О”v = ?",
o:["1/m вҲҡ(h/ПҖ)","вҲҡ(h/ПҖ)","1/2m вҲҡ(h/ПҖ)","вҲҡ(h/2ПҖ)"],a:2},
{q:"17. Uncertainty in velocity:",
o:["1Г—10вҒ№ cm/s","1Г—10В№В№ cm/s","1Г—10вҒө cm/s","1Г—10вҒ¶ cm/s"],a:0},
{q:"18. Max electrons in sub-shell:",
o:["2l+1","4l+2","2nВІ","4l"],a:1},
{q:"19. Not permissible arrangement:",
o:["n=5,l=3,m=0","n=3,l=2,m=-2","n=3,l=2,m=-3","n=4,l=0,m=0"],a:2},
{q:"20. KE per atom:",
o:["2.2Г—10вҒ»В№вҒ№ J","2Г—10вҒ»В№вҒ№ J","2Г—10вҒ»ВІвҒ° J","4Г—10вҒ»ВІвҒ° J"],a:2},
{q:"21. Electronic config [Ar]3dвҒ¶:",
o:["CoВівҒә","NiВівҒә","MnВівҒә","FeВівҒә"],a:0},
{q:"22. Correct filling sequence:",
o:["nsвҶ’npвҶ’(n-1)dвҶ’(n-2)f","nsвҶ’(n-2)fвҶ’(n-1)dвҶ’np","nsвҶ’(n-1)dвҶ’(n-2)fвҶ’np","nsвҶ’(n-2)fвҶ’npвҶ’(n-1)d"],a:1},
{q:"23. Relation between wavelengths:",
o:["О»1=О»2","О»1=2О»2","О»1=4О»2","О»1=ВҪО»2"],a:1},
{q:"24. Max electrons (l=3,n=4):",
o:["10","12","14","16"],a:2},
{q:"25. Quantum numbers for Rb valence electron:",
o:["5,0,0,+1/2","5,1,0,+1/2","5,1,1,+1/2","6,0,0,+1/2"],a:0},
{q:"26. Orbital angular momentum (p electron):",
o:["вҲҡ3 h/2ПҖ","вҲҡ(3/2) h/2ПҖ","вҲҡ6 h/2ПҖ","h/вҲҡ2ПҖ"],a:3},
{q:"27. Wavelength closest value:",
o:["25","50","75","10"],a:1},
{q:"28. Max electrons (n=3,l=1,m=-1):",
o:["6","4","2","10"],a:2},
{q:"29. Max orbitals (n=3,l=1,m=0):",
o:["1","2","3","4"],a:0},
{q:"30. Energy of 45 nm light:",
o:["4.42Г—10вҒ»В№вҒө","4.42Г—10вҒ»В№вҒё","6.67Г—10В№В№","6.67Г—10В№вҒө"],a:1},
{q:"31. Magnetic moment 2.84 BM:",
o:["NiВІвҒә","TiВівҒә","CrВівҒә","CoВІвҒә"],a:2},
{q:"32. Angular momentum in d orbital:",
o:["0","вҲҡ2 Д§","вҲҡ6 Д§","2вҲҡ3 Д§"],a:2},
{q:"33. Two electrons in same orbital distinguished by:",
o:["n","l","m","Spin"],a:3},
{q:"34. Electrons in orbital (n=3,l=1):",
o:["2","6","10","14"],a:0},
{q:"35. Orbitals with density along axes:",
o:["dzВІ & dxВІ-yВІ","dzВІ & dxz","dxz & dyz","dxy & dxВІ-yВІ"],a:0},
{q:"36. Wrong statement:",
o:["О”EО”t вүҘ h/4ПҖ","Half filled more stable","2s lower than 2p (H-like)","All correct"],a:2},
{q:"37. Wrong statement:",
o:["Given N configuration shown","Orbital has 3 quantum numbers","s orbital angular momentum zero","m for dzВІ is 0"],a:0}
];

const form = document.getElementById("quizForm");

questions.forEach((item,index)=>{
    let div=document.createElement("div");
    div.className="question";
    div.innerHTML=`<p>${item.q}</p>`;
    item.o.forEach((opt,i)=>{
        div.innerHTML+=`
        <label>
        <input type="radio" name="q${index}" value="${i}">
        ${opt}
        </label><br>`;
    });
    form.appendChild(div);
});

</script>

<br>
<button type="button" onclick="submitQuiz()">Submit Quiz</button>
<div class="result" id="result"></div>

</form>
</div>

<script>
function submitQuiz(){
    let score=0;
    questions.forEach((item,index)=>{
        const ans=document.querySelector(`input[name="q${index}"]:checked`);
        if(ans && parseInt(ans.value)===item.a){
            score++;
        }
    });
    document.getElementById("result").innerHTML=
    "Your Score: "+score+" / "+questions.length;
}
</script>

</body>
</html>
